<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      *,
      *::after,
      *::before {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        transition: 0.5s;
      }

      .parent{
        min-height:100vh;
        background-color: cadetblue;
        padding-block: 100px;

        .main{
            width: 90%;
            background-color: burlywood;
            display: flex;
            margin: 0 auto;
            align-items: flex-start;

            div{
                width: 50%;
                padding-inline: 50px;
            }

            .left{
                background-color: blueviolet;
                height: 1000px;
            }

            .right{
                background-color:chocolate;
                position: sticky;
                top: 0;
            }
        }
      }


    </style>
  </head>
  <body>
    <div class="parent">
      <div class="main">
        <div class="left"></div>
        <div class="right">Lorem ipsum, dolor sit amet consectetur adipisicing elit. Ducimus ad dolor eveniet! Placeat neque in veniam culpa eligendi! Enim quos omnis vero at unde, commodi alias fuga. Repellendus, dolorum dolorem!</div>
      </div>
    </div>
  </body>
</html>
